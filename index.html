<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>umangx - keygraph</title>
</head>

<body>
  <div id="main">
    <div id="infobar">cursor</div>
    <div id="shapeDisplay">cursor</div>
    <div id="shapeSizeDisplay">cursor</div>
    <div id="bar">
      <span id="status-display">System Status</span>
      <input type="text" id="user-input" placeholder="Enter command..." />
      <button id="submit-btn">Execute</button>
    </div>
    <div id="main-canvas">
      <div id="canvas-hint">Press <kbd>Space</kbd> to open menu</div>
    </div>
    <script src="/src/Keygraph.js" type="module"></script>
  </div>
</body>

</html>
